    <style>

        body {
            font-family: "Microsoft YaHei", "SimHei", sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background: #fff;
            width: 100%;
            max-width: 480px;
            padding: 38px 34px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);

        .header { text-align: center; margin-bottom: 28px; }

        .header p { color: #7f8c8d; font-size: 14px; margin-top: 6px; }
        .form-group { margin-bottom: 18px; }
        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 6px;
        }
        input[type="text"] {
            width: 100%;
            padding: 11px 14px;
            border: 1px solid #dcdde1;
            border-radius: 6px;
            font-size: 15px;
            transition: border 0.2s;
        }
        input[type="text"]:focus {
            border-color: #2980b9;
            outline: none;
            box-shadow: 0 0 0 2px rgba(41,128,185,0.15);
        }
        .btn {
            width: 100%;
            padding: 12px;
            background: #1a3c64;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 8px;
        }
        .btn:hover { background: #0f2a47; }
        .btn:disabled { background: #b0bec5; cursor: not-allowed; }
        .loading {
            display: none;
            text-align: center;
            margin: 18px 0;
        }
        .spinner {
            border: 3px solid #ecf0f1;
            border-top: 3px solid #1a3c64;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error-msg {
            display: none;
            background: #fee;
            color: #c0392b;
            padding: 10px;
            border-radius: 6px;
            font-size: 14px;
            margin-top: 12px;
            text-align: center;
        }
        .result-area {
            display: none;
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid #ecf0f1;
            text-align: center;
        }
        .result-area h3 { color: #1a3c64; margin-bottom: 12px; }
        .result-img {
            max-width: 100%;
            border-radius: 6px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .footer {
            text-align: center;
            margin-top: 24px;
            font-size: 12px;
            color: #95a5a6;
            border-top: 1px solid #ecf0f1;
            padding-top: 14px;
        }
    </style>
</head>
